<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F7F8FA;
      color: #1A1A1A;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    h2 { font-size: 15px; font-weight: 600; }
    .subtitle { font-size: 11px; color: #808080; }

    /* ─── Tab bar ─────────────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 4px;
      margin-top: 14px;
      background: #EEEEF0;
      border-radius: 8px;
      padding: 3px;
    }
    .tab-btn {
      flex: 1;
      padding: 7px 0;
      text-align: center;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      color: #808080;
      background: transparent;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.5); }
    .tab-btn.active { background: #4D7CFE; color: #fff; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ─── Shared styles ───────────────────────────── */
    .target-bar {
      background: #EEEEF0;
      border-radius: 6px;
      padding: 8px 10px;
      margin-top: 16px;
      font-size: 11px;
      color: #808080;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .target-bar.active { background: #E8F0FE; color: #4D7CFE; }
    .target-bar .icon { flex-shrink: 0; width: 14px; height: 14px; }
    .target-bar .name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .target-bar .size { margin-left: auto; flex-shrink: 0; opacity: 0.7; }

    .btn-regen {
      display: none;
      width: 100%;
      padding: 9px 0;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      background: #4D7CFE;
      color: #fff;
      margin-top: 10px;
    }
    .btn-regen:hover:not(:disabled) { background: #3A6AE8; }
    .btn-regen:active:not(:disabled) { transform: scale(0.97); }
    .btn-regen:disabled { opacity: 0.45; cursor: default; }

    .field { margin-top: 16px; }
    .field label { display: block; font-size: 11px; color: #808080; margin-bottom: 4px; }
    .field input[type="text"],
    .field input[type="number"] {
      width: 100%;
      padding: 7px 10px;
      border: 1.5px solid #E0E0E0;
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      color: #1A1A1A;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #4D7CFE; }
    .field input::placeholder { color: #AAAAAA; }

    .radio-group { display: flex; gap: 6px; }
    .radio-option {
      flex: 1;
      padding: 7px 0;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: #808080;
      background: #EEEEF0;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .radio-option input { display: none; }
    .radio-option.active { background: #4D7CFE; color: #fff; }
    .radio-option:hover:not(.active) { background: #E0E0E0; }

    .checkbox-group { display: flex; flex-direction: column; gap: 6px; }
    .checkbox-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; line-height: 1; color: #1A1A1A; cursor: pointer;
    }
    .checkbox-row input[type="checkbox"] {
      width: 14px; height: 14px; margin: 0; flex-shrink: 0;
      accent-color: #4D7CFE; cursor: pointer; vertical-align: middle;
    }

    .btn {
      width: 100%; margin-top: 16px; padding: 10px 0; border: none; border-radius: 8px;
      font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn-primary { background: #4D7CFE; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #3A6AE8; }
    .btn:disabled { opacity: 0.45; cursor: default; }

    .footer { text-align: center; font-size: 10px; color: #AAAAAA; margin-top: 4px; }

    .error-msg { display: none; font-size: 11px; color: #E53935; margin-top: 6px; }
  </style>
</head>
<body>
  <div>
    <h2>Monium All Charts</h2>
    <p class="subtitle">Monium Design System</p>
  </div>

  <!-- ─── Tab bar ─────────────────────────────────── -->
  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="line" onclick="switchTab('line')">Line</button>
    <button class="tab-btn" data-tab="area" onclick="switchTab('area')">Area</button>
    <button class="tab-btn" data-tab="bar" onclick="switchTab('bar')">Bar</button>
    <button class="tab-btn" data-tab="pie" onclick="switchTab('pie')">Pie</button>
  </div>

  <!-- ─── Target bar (shared) ─────────────────────── -->
  <div class="target-bar" id="targetBar">
    <svg class="icon" viewBox="0 0 14 14" fill="none">
      <rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
    </svg>
    <span class="name" id="targetName">Select a Frame or AutoLayout</span>
    <span class="size" id="targetSize"></span>
  </div>

  <button class="btn-regen" id="regenBtn" onclick="regenerate()">Get values from chart</button>
  <div class="error-msg" id="regenError"></div>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  TAB: LINE                                      -->
  <!-- ═══════════════════════════════════════════════ -->
  <div class="tab-panel active" id="panel-line">
    <div class="field">
      <label>Y axis — values (comma-separated)</label>
      <input type="text" id="line-yInput" value="0, 50, 100, 150, 200">
    </div>
    <div class="field">
      <label>Y axis — unit</label>
      <input type="text" id="line-yUnitInput" placeholder="ms, %, $, etc." value="">
    </div>
    <div class="field">
      <label>X axis — labels (comma-separated)</label>
      <input type="text" id="line-xInput" value="Jan, Feb, Mar, Apr, May, Jun">
    </div>
    <div class="field">
      <label>Lines count (1-20)</label>
      <input type="number" id="line-countInput" value="2" min="1" max="20">
    </div>
    <div class="field">
      <label>Line style</label>
      <div class="radio-group" id="line-styleGroup">
        <label class="radio-option active" data-value="smooth">
          <input type="radio" name="lineStyle" value="smooth" checked> Smooth
        </label>
        <label class="radio-option" data-value="sharp">
          <input type="radio" name="lineStyle" value="sharp"> Sharp
        </label>
        <label class="radio-option" data-value="peak">
          <input type="radio" name="lineStyle" value="peak"> Peak
        </label>
      </div>
    </div>
    <div class="field">
      <label>Events</label>
      <div class="checkbox-group">
        <label class="checkbox-row"><input type="checkbox" id="line-topEvent"> Top Event</label>
        <label class="checkbox-row"><input type="checkbox" id="line-bottomEvent"> Bottom Event</label>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  TAB: AREA                                      -->
  <!-- ═══════════════════════════════════════════════ -->
  <div class="tab-panel" id="panel-area">
    <div class="field">
      <label>Y axis — values (comma-separated)</label>
      <input type="text" id="area-yInput" value="0, 50, 100, 150, 200">
    </div>
    <div class="field">
      <label>Y axis — unit</label>
      <input type="text" id="area-yUnitInput" placeholder="ms, %, $, etc." value="">
    </div>
    <div class="field">
      <label>X axis — labels (comma-separated)</label>
      <input type="text" id="area-xInput" value="Jan, Feb, Mar, Apr, May, Jun">
    </div>
    <div class="field">
      <label>Areas count (1-20)</label>
      <input type="number" id="area-countInput" value="3" min="1" max="20">
    </div>
    <div class="field">
      <label>Area style</label>
      <div class="radio-group" id="area-styleGroup">
        <label class="radio-option active" data-value="smooth">
          <input type="radio" name="areaStyle" value="smooth" checked> Smooth
        </label>
        <label class="radio-option" data-value="sharp">
          <input type="radio" name="areaStyle" value="sharp"> Sharp
        </label>
        <label class="radio-option" data-value="peak">
          <input type="radio" name="areaStyle" value="peak"> Peak
        </label>
      </div>
    </div>
    <div class="field">
      <label>Area mode</label>
      <div class="radio-group" id="area-modeGroup">
        <label class="radio-option active" data-value="overlap">
          <input type="radio" name="areaMode" value="overlap" checked> Overlap
        </label>
        <label class="radio-option" data-value="stacked">
          <input type="radio" name="areaMode" value="stacked"> Stacked
        </label>
      </div>
    </div>
    <div class="field" id="area-fillHeightField" style="display: none;">
      <div class="checkbox-group">
        <label class="checkbox-row">
          <input type="checkbox" id="area-fillHeightCheck"> Fill full height
        </label>
      </div>
    </div>
    <div class="field">
      <label>Fill opacity (0.05-1.0)</label>
      <input type="number" id="area-opacityInput" value="0.3" min="0.05" max="1" step="0.05">
    </div>
    <div class="field">
      <label>Events</label>
      <div class="checkbox-group">
        <label class="checkbox-row"><input type="checkbox" id="area-topEvent"> Top Event</label>
        <label class="checkbox-row"><input type="checkbox" id="area-bottomEvent"> Bottom Event</label>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  TAB: BAR                                       -->
  <!-- ═══════════════════════════════════════════════ -->
  <div class="tab-panel" id="panel-bar">
    <div class="field">
      <label>Y axis — values (comma-separated)</label>
      <input type="text" id="bar-yInput" value="0, 50, 100, 150, 200">
    </div>
    <div class="field">
      <label>Y axis — unit</label>
      <input type="text" id="bar-yUnitInput" placeholder="ms, %, $, etc." value="">
    </div>
    <div class="field">
      <label>X axis — labels (comma-separated)</label>
      <input type="text" id="bar-xInput" value="Jan, Feb, Mar, Apr, May, Jun">
    </div>
    <div class="field">
      <label>Series count (1-20)</label>
      <input type="number" id="bar-countInput" value="3" min="1" max="20">
    </div>
    <div class="field">
      <label>Orientation</label>
      <div class="radio-group" id="bar-orientationGroup">
        <label class="radio-option active" data-value="vertical">
          <input type="radio" name="barOrientation" value="vertical" checked> Vertical
        </label>
        <label class="radio-option" data-value="horizontal">
          <input type="radio" name="barOrientation" value="horizontal"> Horizontal
        </label>
      </div>
    </div>
    <div class="field">
      <label>Bar mode</label>
      <div class="radio-group" id="bar-modeGroup">
        <label class="radio-option active" data-value="normal">
          <input type="radio" name="barMode" value="normal" checked> Normal
        </label>
        <label class="radio-option" data-value="grouped">
          <input type="radio" name="barMode" value="grouped"> Grouped
        </label>
        <label class="radio-option" data-value="stacked">
          <input type="radio" name="barMode" value="stacked"> Stacked
        </label>
      </div>
    </div>
    <div class="field" id="bar-gapRow">
      <label>Bar gap (px)</label>
      <input type="number" id="bar-gapInput" value="1" min="0" max="50" step="1">
    </div>
    <div class="field" id="bar-denseRow">
      <div class="checkbox-group">
        <label class="checkbox-row"><input type="checkbox" id="bar-denseCheck"> Dense bars (more data points)</label>
      </div>
    </div>
    <div class="field">
      <label>Fill opacity (0.05-1.0)</label>
      <input type="number" id="bar-opacityInput" value="1" min="0.05" max="1" step="0.05">
    </div>
    <div class="field">
      <label>Events</label>
      <div class="checkbox-group">
        <label class="checkbox-row"><input type="checkbox" id="bar-topEvent"> Top Event</label>
        <label class="checkbox-row"><input type="checkbox" id="bar-bottomEvent"> Bottom Event</label>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  TAB: PIE                                       -->
  <!-- ═══════════════════════════════════════════════ -->
  <div class="tab-panel" id="panel-pie">
    <div class="field">
      <label>Values (comma-separated, leave empty for random)</label>
      <input type="text" id="pie-valuesInput" placeholder="e.g. 660, 150, 142, 122, 5, 15" value="">
    </div>
    <div class="field" id="pie-segmentsRow">
      <label>Segments count (1-20)</label>
      <input type="number" id="pie-segmentsInput" value="5" min="1" max="20">
    </div>
    <div class="field">
      <label>Pie style</label>
      <div class="radio-group" id="pie-styleGroup">
        <label class="radio-option" data-value="pie">
          <input type="radio" name="pieStyle" value="pie"> Pie
        </label>
        <label class="radio-option active" data-value="donut">
          <input type="radio" name="pieStyle" value="donut" checked> Donut
        </label>
      </div>
    </div>
    <div class="field" id="pie-innerRadiusRow">
      <label>Inner radius % (30-80)</label>
      <input type="number" id="pie-innerRadiusInput" value="55" min="30" max="80" step="1">
    </div>
    <div class="field" id="pie-cornerRadiusRow">
      <label>Corner radius (0-50)</label>
      <input type="number" id="pie-cornerRadiusInput" value="0" min="0" max="50" step="1">
    </div>
    <div class="field">
      <label>Segment gap (degrees, 0-10)</label>
      <input type="number" id="pie-gapInput" value="1" min="0" max="10" step="0.5">
    </div>
    <div class="field">
      <label>Display</label>
      <div class="checkbox-group">
        <label class="checkbox-row"><input type="checkbox" id="pie-labelsCheck"> Show value labels</label>
        <label class="checkbox-row" id="pie-totalRow"><input type="checkbox" id="pie-totalCheck"> Show center total</label>
      </div>
    </div>
    <div class="field">
      <label>Fill opacity (0.05-1.0)</label>
      <input type="number" id="pie-opacityInput" value="1" min="0.05" max="1" step="0.05">
    </div>
  </div>

  <!-- ─── Insert button (shared) ──────────────────── -->
  <button class="btn btn-primary" id="insertBtn" onclick="generate()">Insert chart</button>
  <div class="footer">Monium Design System v1.1</div>

  <script>
    // ═══════════════════════════════════════════════
    //  State
    // ═══════════════════════════════════════════════
    var currentTab = 'line';
    var storedChartData = null;
    var replaceMode = false;

    // ═══════════════════════════════════════════════
    //  Tab switching
    // ═══════════════════════════════════════════════
    function switchTab(tab) {
      currentTab = tab;
      // Update tab buttons
      document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });
      // Update panels
      document.querySelectorAll('.tab-panel').forEach(function(panel) {
        panel.classList.toggle('active', panel.id === 'panel-' + tab);
      });
      replaceMode = false;
      hideRegenError();

      var regenBtn = document.getElementById('regenBtn');
      if (storedChartData && storedChartData.chartType === tab) {
        // Same chart type as detected — show regen, disable insert
        regenBtn.style.display = 'block';
        setRegenEnabled(true);
        setInsertEnabled(false);
      } else {
        // Different chart type or no chart — hide regen, enable insert
        regenBtn.style.display = 'none';
        setInsertEnabled(true);
      }
      resizeUI();
    }

    // ═══════════════════════════════════════════════
    //  Shared UI helpers
    // ═══════════════════════════════════════════════
    function setInsertEnabled(enabled) {
      document.getElementById('insertBtn').disabled = !enabled;
    }
    function setRegenEnabled(enabled) {
      document.getElementById('regenBtn').disabled = !enabled;
    }
    function showRegenError(text) {
      var el = document.getElementById('regenError');
      el.textContent = text; el.style.display = 'block';
    }
    function hideRegenError() {
      document.getElementById('regenError').style.display = 'none';
    }

    function setRadio(groupId, val) {
      document.querySelectorAll('#' + groupId + ' .radio-option').forEach(function(o) {
        o.classList.remove('active');
        if (o.dataset.value === val) {
          o.classList.add('active');
          o.querySelector('input').checked = true;
        }
      });
    }

    function getRadio(name) {
      var checked = document.querySelector('input[name="' + name + '"]:checked');
      return checked ? checked.value : null;
    }

    // ═══════════════════════════════════════════════
    //  Radio group click handlers
    // ═══════════════════════════════════════════════
    function setupRadioGroup(groupId, onChange) {
      document.querySelectorAll('#' + groupId + ' .radio-option').forEach(function(opt) {
        opt.addEventListener('click', function() {
          document.querySelectorAll('#' + groupId + ' .radio-option').forEach(function(o) { o.classList.remove('active'); });
          opt.classList.add('active');
          opt.querySelector('input').checked = true;
          if (onChange) onChange();
        });
      });
    }

    // Line radios
    setupRadioGroup('line-styleGroup');

    // Area radios
    setupRadioGroup('area-styleGroup');
    setupRadioGroup('area-modeGroup', function() { updateAreaStackScaleVisibility(); });

    function updateAreaStackScaleVisibility() {
      var isStacked = getRadio('areaMode') === 'stacked';
      document.getElementById('area-fillHeightField').style.display = isStacked ? 'block' : 'none';
      resizeUI();
    }

    // Bar radios
    setupRadioGroup('bar-orientationGroup');
    setupRadioGroup('bar-modeGroup', function() { updateBarVisibility(); });

    function updateBarVisibility() {
      var mode = getRadio('barMode');
      var showDense = (mode === 'normal' || mode === 'stacked');
      document.getElementById('bar-denseRow').style.display = showDense ? '' : 'none';
      document.getElementById('bar-gapRow').style.display = (mode !== 'grouped') ? '' : 'none';
      if (!showDense) document.getElementById('bar-denseCheck').checked = false;
      // Series count disabled for normal
      var countInput = document.getElementById('bar-countInput');
      var disabled = (mode === 'normal');
      countInput.disabled = disabled;
      countInput.style.opacity = disabled ? '0.4' : '1';
      resizeUI();
    }

    // Pie radios
    setupRadioGroup('pie-styleGroup', function() { updatePieDonutVisibility(); });

    function updatePieDonutVisibility() {
      var isDonut = (getRadio('pieStyle') === 'donut');
      document.getElementById('pie-innerRadiusRow').style.display = isDonut ? '' : 'none';
      document.getElementById('pie-cornerRadiusRow').style.display = isDonut ? '' : 'none';
      document.getElementById('pie-totalRow').style.display = isDonut ? '' : 'none';
      if (!isDonut) document.getElementById('pie-totalCheck').checked = false;
      resizeUI();
    }

    function updatePieSegmentsVisibility() {
      var val = document.getElementById('pie-valuesInput').value.trim();
      var hasValues = val.length > 0 && val.split(',').filter(function(s) { return !isNaN(parseFloat(s.trim())) && s.trim().length > 0; }).length > 0;
      document.getElementById('pie-segmentsRow').style.display = hasValues ? 'none' : '';
      resizeUI();
    }

    document.getElementById('pie-valuesInput').addEventListener('input', updatePieSegmentsVisibility);

    // Init visibility
    updateBarVisibility();
    updatePieDonutVisibility();
    updatePieSegmentsVisibility();
    updateAreaStackScaleVisibility();

    // ═══════════════════════════════════════════════
    //  Regenerate (populate fields from chart data)
    // ═══════════════════════════════════════════════
    function regenerate() {
      hideRegenError();
      if (!storedChartData) {
        showRegenError('Failed to get data: no chart found in selected frame');
        return;
      }
      var d = storedChartData;
      var chartType = d.chartType;

      if (!chartType) {
        showRegenError('Failed to detect chart type');
        return;
      }

      // Switch to the correct tab
      switchTab(chartType);

      if (chartType === 'line') {
        if (!d.yValues || d.yValues.length < 2) { showRegenError('Failed to get data: could not read Y axis values'); return; }
        if (!d.xLabels || d.xLabels.length < 1) { showRegenError('Failed to get data: could not read X axis labels'); return; }
        document.getElementById('line-yInput').value = d.yValues.join(', ');
        document.getElementById('line-yUnitInput').value = d.yUnit || '';
        document.getElementById('line-xInput').value = d.xLabels.join(', ');
        document.getElementById('line-countInput').value = String(d.linesCount || 2);
        setRadio('line-styleGroup', d.lineStyle || 'smooth');
        document.getElementById('line-topEvent').checked = !!d.topEvent;
        document.getElementById('line-bottomEvent').checked = !!d.bottomEvent;
      } else if (chartType === 'area') {
        if (!d.yValues || d.yValues.length < 2) { showRegenError('Failed to get data: could not read Y axis values'); return; }
        if (!d.xLabels || d.xLabels.length < 1) { showRegenError('Failed to get data: could not read X axis labels'); return; }
        document.getElementById('area-yInput').value = d.yValues.join(', ');
        document.getElementById('area-yUnitInput').value = d.yUnit || '';
        document.getElementById('area-xInput').value = d.xLabels.join(', ');
        document.getElementById('area-countInput').value = String(d.areasCount || 3);
        setRadio('area-styleGroup', d.areaStyle || 'smooth');
        setRadio('area-modeGroup', d.areaMode || 'overlap');
        document.getElementById('area-fillHeightCheck').checked = !!d.fillHeight;
        document.getElementById('area-opacityInput').value = String(d.fillOpacity !== undefined ? Math.round(d.fillOpacity * 100) / 100 : 0.3);
        document.getElementById('area-topEvent').checked = !!d.topEvent;
        document.getElementById('area-bottomEvent').checked = !!d.bottomEvent;
        updateAreaStackScaleVisibility();
      } else if (chartType === 'bar') {
        if (!d.yValues || d.yValues.length < 2) { showRegenError('Failed to get data: could not read Y axis values'); return; }
        if (!d.xLabels || d.xLabels.length < 1) { showRegenError('Failed to get data: could not read X axis labels'); return; }
        document.getElementById('bar-yInput').value = d.yValues.join(', ');
        document.getElementById('bar-yUnitInput').value = d.yUnit || '';
        document.getElementById('bar-xInput').value = d.xLabels.join(', ');
        document.getElementById('bar-countInput').value = String(d.barsCount || 3);
        setRadio('bar-orientationGroup', d.orientation || 'vertical');
        setRadio('bar-modeGroup', d.barMode || 'normal');
        document.getElementById('bar-gapInput').value = String(d.barGap !== undefined ? d.barGap : 1);
        document.getElementById('bar-opacityInput').value = String(d.fillOpacity !== undefined ? Math.round(d.fillOpacity * 100) / 100 : 1);
        document.getElementById('bar-denseCheck').checked = !!d.dense;
        document.getElementById('bar-topEvent').checked = !!d.topEvent;
        document.getElementById('bar-bottomEvent').checked = !!d.bottomEvent;
        updateBarVisibility();
      } else if (chartType === 'pie') {
        if (d.values && d.values.length > 0) {
          document.getElementById('pie-valuesInput').value = d.values.join(', ');
        }
        document.getElementById('pie-segmentsInput').value = String(d.segmentsCount || 5);
        setRadio('pie-styleGroup', d.pieStyle || 'donut');
        document.getElementById('pie-innerRadiusInput').value = String(d.innerRadiusPct || 55);
        document.getElementById('pie-cornerRadiusInput').value = String(d.cornerRadius || 0);
        document.getElementById('pie-gapInput').value = String(d.segmentGap !== undefined ? d.segmentGap : 1);
        document.getElementById('pie-labelsCheck').checked = !!d.showLabels;
        document.getElementById('pie-totalCheck').checked = !!d.showTotal;
        document.getElementById('pie-opacityInput').value = String(d.fillOpacity !== undefined ? Math.round(d.fillOpacity * 100) / 100 : 1);
        updatePieDonutVisibility();
        updatePieSegmentsVisibility();
      }

      replaceMode = true;
      setInsertEnabled(true);
      setRegenEnabled(false);
    }

    // ═══════════════════════════════════════════════
    //  Generate (send message to plugin code)
    // ═══════════════════════════════════════════════
    function generate() {
      var msgData = { type: 'generate', chartType: currentTab, replace: replaceMode };

      if (currentTab === 'line') {
        var yRaw = document.getElementById('line-yInput').value.trim();
        var xRaw = document.getElementById('line-xInput').value.trim();
        msgData.yValues = yRaw.split(',').map(function(s) { return parseFloat(s.trim()); }).filter(function(n) { return !isNaN(n); });
        msgData.xLabels = xRaw.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
        msgData.linesCount = Math.max(1, Math.min(20, parseInt(document.getElementById('line-countInput').value) || 2));
        msgData.lineStyle = getRadio('lineStyle');
        msgData.yUnit = document.getElementById('line-yUnitInput').value.trim();
        msgData.topEvent = document.getElementById('line-topEvent').checked;
        msgData.bottomEvent = document.getElementById('line-bottomEvent').checked;

      } else if (currentTab === 'area') {
        var yRaw = document.getElementById('area-yInput').value.trim();
        var xRaw = document.getElementById('area-xInput').value.trim();
        msgData.yValues = yRaw.split(',').map(function(s) { return parseFloat(s.trim()); }).filter(function(n) { return !isNaN(n); });
        msgData.xLabels = xRaw.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
        msgData.areasCount = Math.max(1, Math.min(20, parseInt(document.getElementById('area-countInput').value) || 3));
        msgData.areaStyle = getRadio('areaStyle');
        msgData.areaMode = getRadio('areaMode');
        msgData.fillHeight = document.getElementById('area-fillHeightCheck').checked;
        msgData.fillOpacity = Math.max(0.05, Math.min(1, parseFloat(document.getElementById('area-opacityInput').value) || 0.3));
        msgData.yUnit = document.getElementById('area-yUnitInput').value.trim();
        msgData.topEvent = document.getElementById('area-topEvent').checked;
        msgData.bottomEvent = document.getElementById('area-bottomEvent').checked;

      } else if (currentTab === 'bar') {
        var yRaw = document.getElementById('bar-yInput').value.trim();
        var xRaw = document.getElementById('bar-xInput').value.trim();
        msgData.yValues = yRaw.split(',').map(function(s) { return parseFloat(s.trim()); }).filter(function(n) { return !isNaN(n); });
        msgData.xLabels = xRaw.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
        msgData.barsCount = Math.max(1, Math.min(20, parseInt(document.getElementById('bar-countInput').value) || 3));
        msgData.orientation = getRadio('barOrientation');
        msgData.barMode = getRadio('barMode');
        msgData.dense = document.getElementById('bar-denseCheck').checked;
        msgData.barGap = Math.max(0, parseInt(document.getElementById('bar-gapInput').value) || 1);
        msgData.fillOpacity = Math.max(0.05, Math.min(1, parseFloat(document.getElementById('bar-opacityInput').value) || 1));
        msgData.yUnit = document.getElementById('bar-yUnitInput').value.trim();
        msgData.topEvent = document.getElementById('bar-topEvent').checked;
        msgData.bottomEvent = document.getElementById('bar-bottomEvent').checked;

      } else if (currentTab === 'pie') {
        var valRaw = document.getElementById('pie-valuesInput').value.trim();
        var values = [];
        if (valRaw.length > 0) {
          values = valRaw.split(',').map(function(s) { return parseFloat(s.trim()); }).filter(function(n) { return !isNaN(n) && n > 0; });
        }
        msgData.values = values;
        msgData.segmentsCount = Math.max(1, Math.min(20, parseInt(document.getElementById('pie-segmentsInput').value) || 5));
        msgData.pieStyle = getRadio('pieStyle');
        msgData.innerRadiusPct = Math.max(30, Math.min(80, parseInt(document.getElementById('pie-innerRadiusInput').value) || 55));
        msgData.cornerRadius = Math.max(0, Math.min(50, parseInt(document.getElementById('pie-cornerRadiusInput').value) || 0));
        msgData.segmentGap = Math.max(0, Math.min(10, parseFloat(document.getElementById('pie-gapInput').value) || 0));
        msgData.showLabels = document.getElementById('pie-labelsCheck').checked;
        msgData.showTotal = document.getElementById('pie-totalCheck').checked;
        msgData.fillOpacity = Math.max(0.05, Math.min(1, parseFloat(document.getElementById('pie-opacityInput').value) || 1));
      }

      parent.postMessage({ pluginMessage: msgData }, '*');

      replaceMode = false;
      setInsertEnabled(false);
      if (storedChartData) setRegenEnabled(true);
    }

    // ═══════════════════════════════════════════════
    //  Selection message from plugin
    // ═══════════════════════════════════════════════
    window.onmessage = function(event) {
      var msg = event.data.pluginMessage;
      if (!msg || msg.type !== 'selection') return;

      var bar = document.getElementById('targetBar');
      var name = document.getElementById('targetName');
      var size = document.getElementById('targetSize');
      var regenBtn = document.getElementById('regenBtn');

      if (msg.hasFrame) {
        bar.className = 'target-bar active';
        name.textContent = msg.name;
        size.textContent = msg.width + ' x ' + msg.height;
      }

      hideRegenError();

      if (msg.hasChart && msg.chartData) {
        storedChartData = msg.chartData;
        // Auto-switch to detected chart type tab
        // switchTab handles regen button visibility and insert state
        if (storedChartData.chartType) {
          switchTab(storedChartData.chartType);
        }
      } else {
        storedChartData = null;
        regenBtn.style.display = 'none';
        replaceMode = false;
        setInsertEnabled(true);
      }

      resizeUI();
    };

    // ═══════════════════════════════════════════════
    //  Dynamic resize
    // ═══════════════════════════════════════════════
    function resizeUI() {
      var h = document.body.scrollHeight;
      parent.postMessage({ pluginMessage: { type: 'resize', height: h } }, '*');
    }

    resizeUI();
    new MutationObserver(resizeUI).observe(document.body, { childList: true, subtree: true, attributes: true });
  </script>
</body>
</html>
